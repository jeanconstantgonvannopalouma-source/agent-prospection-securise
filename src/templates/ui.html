<!DOCTYPE html>
<html>
<head>
    <title>Agent de Prospection</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
            margin: 0;
        }
        #lottie-header {
            width: 100px;
            height: 100px;
        }
        #messages {
            margin: 20px 0;
        }
        .message {
            background: white;
            color: black;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Agent de Prospection</h1>
    <div id="lottie-header"></div>
    <div id="messages"></div>
    <input id="prompt" placeholder="Posez votre question...">
    <button id="send">Envoyer</button>

    <script>
        // Animation Lottie
        lottie.loadAnimation({
            container: document.getElementById("lottie-header"),
            renderer: "svg",
            loop: true,
            autoplay: true,
            path: "https://assets10.lottiefiles.com/packages/lf20_qp1q7mct.json"
        });

        // Chat basique
        document.getElementById("send").addEventListener("click", async () => {
            const prompt = document.getElementById("prompt").value;
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: prompt })
            });
            const data = await response.json();
            const msgDiv = document.createElement("div");
            msgDiv.className = "message";
            msgDiv.textContent = data.reply;
            document.getElementById("messages").appendChild(msgDiv);
        });
    </script>
</body>
</html>
